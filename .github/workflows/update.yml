name: Update Portfolio

on:
  push:

jobs:

  update:

    runs-on:
      ubuntu-latest

    steps:

      - uses:
          actions/checkout@v4

      - uses:
          actions/setup-python@v5

        with:

          python-version:
            "3.14"

      - run:
          pip install requests

      - run:
          python github_fetch.py