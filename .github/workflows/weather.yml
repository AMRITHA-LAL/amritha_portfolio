name: Weather Alert

on:

  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:

jobs:

  weather:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

        with:
          python-version: "3.12"

      - run: pip install requests

      - run: python weather_alert.py